<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 2: Monitor Display QR (White Mode)</title>
    
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #ffffff !important; 
            color: #222222 !important;
        }
        .box { 
            max-width: 450px; 
            margin: 0 auto; 
            background-color: #ffffff !important; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            border: 1px solid #dddddd !important;
        }
        #kode-output { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #007bff !important; letter-spacing: 3px; }
        .qrcode-container { margin: 20px 0; display: flex; justify-content: center; align-items: center; min-height: 150px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Web 2: QR Code Monitor</h2>
    <p>Menampilkan QR Code terbaru dari sistem:</p>
    <div id="kode-output">-----</div>
    <div class="qrcode-container"><div id="qrcode"></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, query, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // PENTING: Ganti dengan URL Firebase Anda sendiri
    const firebaseConfig = { databaseURL: "https://GANTI_DENGAN_URL_FIREBASE_MU.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let qrcodeInstance = new QRCode(document.getElementById("qrcode"), { 
        width: 200, 
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff"
    });

    const q = query(ref(database, 'sistem/riwayat_kode'), limitToLast(1));
    onValue(q, (snapshot) => {
        if (snapshot.exists()) {
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                document.getElementById('kode-output').innerText = data.angka;
                qrcodeInstance.makeCode(data.angka);
            });
        }
    });
</script>
</body>
</html>
